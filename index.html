<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>ENCORE Wellness Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --emerald:#059669;--emerald-light:#d1fae5;--emerald-dark:#047857;
  --orange:#ea580c;--orange-light:#fff7ed;
  --indigo:#4f46e5;--indigo-light:#e0e7ff;
  --cyan:#0891b2;--cyan-light:#cffafe;
  --rose:#e11d48;--rose-light:#fff1f2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;
  --shadow:0 1px 3px rgba(0,0,0,.1);--shadow-md:0 4px 6px rgba(0,0,0,.07);
  --radius:12px;--radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-800);overscroll-behavior:none;line-height:1.5}
#app{max-width:500px;margin:0 auto;padding:0 16px 88px;min-height:100vh;min-height:100dvh}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* Typography */
h1{font-size:22px;font-weight:800;line-height:1.2}
h2{font-size:18px;font-weight:700;line-height:1.3}
h3{font-size:15px;font-weight:700}
h4{font-size:14px;font-weight:600}
.text-xs{font-size:11px}.text-sm{font-size:13px}.text-lg{font-size:17px}.text-xl{font-size:20px}.text-2xl{font-size:24px}.text-3xl{font-size:30px}
.fw-500{font-weight:500}.fw-600{font-weight:600}.fw-700{font-weight:700}.fw-800{font-weight:800}
.text-gray{color:var(--gray-500)}.text-gray-dark{color:var(--gray-600)}.text-white{color:#fff}

/* Layout */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.items-start{align-items:start}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}.shrink-0{flex-shrink:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.w-full{width:100%}.text-center{text-center}.text-right{text-align:right}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.ml-auto{margin-left:auto}
.space-y > *+*{margin-top:12px}
.space-y-sm > *+*{margin-top:8px}

/* Cards & Components */
.card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-lg{border-radius:var(--radius-lg);padding:20px}
.hero{border-radius:var(--radius-lg);padding:20px;color:#fff;position:relative;overflow:hidden}
.hero-emerald{background:linear-gradient(135deg,#059669,#0d9488)}
.hero-orange{background:linear-gradient(135deg,#ea580c,#e11d48)}
.hero-indigo{background:linear-gradient(135deg,#4f46e5,#7c3aed)}
.hero-cyan{background:linear-gradient(135deg,#0891b2,#06b6d4)}
.hero-rose{background:linear-gradient(135deg,#e11d48,#ec4899)}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-emerald{background:var(--emerald-light);color:var(--emerald-dark)}
.badge-orange{background:#fff7ed;color:#c2410c}
.badge-indigo{background:#e0e7ff;color:#4338ca}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-purple{background:#f3e8ff;color:#7e22ce}
.badge-gray{background:var(--gray-100);color:var(--gray-500)}
.badge-rose{background:#ffe4e6;color:#be123c}
.badge-sky{background:#e0f2fe;color:#0369a1}
.badge-amber{background:#fef3c7;color:#b45309}
.badge-teal{background:#ccfbf1;color:#0f766e}

.alert{border-radius:var(--radius);padding:14px;display:flex;gap:10px;align-items:flex-start}
.alert-amber{background:#fffbeb;border:1px solid #fde68a}
.alert-red{background:#fef2f2;border:1px solid #fecaca}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe}
.alert-indigo{background:#eef2ff;border:1px solid #c7d2fe}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:var(--radius);font-weight:600;font-size:14px;border:none;cursor:pointer;transition:.15s;font-family:inherit;touch-action:manipulation}
.btn-emerald{background:var(--emerald);color:#fff}.btn-emerald:active{background:var(--emerald-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--gray-200);color:var(--gray-700)}.btn-outline:active{background:var(--gray-100)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}
.btn-icon{width:40px;height:40px;padding:0;border-radius:50%;background:var(--gray-100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.15s}
.btn-icon:active{background:var(--gray-200)}

/* Day pills */
.day-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-pills::-webkit-scrollbar{display:none}
.pill{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;background:var(--gray-100);color:var(--gray-600);transition:.15s;touch-action:manipulation}
.pill.active{color:#fff;box-shadow:var(--shadow-md)}
.pill.active-orange{background:var(--orange)}
.pill.active-indigo{background:var(--indigo)}

/* Week nav */
.week-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 8px}
.week-btn{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;background:var(--gray-100);font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s}
.week-btn:active{background:var(--gray-200)}
.week-btn:disabled{opacity:.3;cursor:default}

/* Week grid */
.week-grid{display:flex;gap:4px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.week-grid::-webkit-scrollbar{display:none}
.week-dot{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--gray-100);color:var(--gray-500);transition:.15s;flex-shrink:0}
.week-dot.active{background:var(--indigo);color:#fff;box-shadow:var(--shadow-md)}
.week-dot.current{outline:2px solid var(--emerald);outline-offset:1px}

/* Progress */
.progress-track{width:100%;height:10px;background:var(--gray-200);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;transition:width .5s ease}
.progress-emerald{background:linear-gradient(90deg,#059669,#0d9488)}
.progress-blue{background:linear-gradient(90deg,#2563eb,#3b82f6)}

/* Water bar */
.water-bar{display:flex;gap:3px;justify-content:center}
.water-glass{width:24px;height:32px;border-radius:3px;transition:.3s}
.water-glass.filled{background:#60a5fa}.water-glass.empty{background:var(--gray-200)}

/* Checklist */
.check-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius);border:1px solid var(--gray-200);background:#fff;cursor:pointer;transition:.15s;touch-action:manipulation}
.check-item:active{transform:scale(.98)}
.check-item.done{background:#ecfdf5;border-color:#a7f3d0}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--gray-300);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-size:14px}
.check-item.done .check-circle{background:var(--emerald);border-color:var(--emerald);color:#fff}
.check-label{font-size:13px;font-weight:500;color:var(--gray-700);flex:1}
.check-item.done .check-label{color:var(--emerald-dark);text-decoration:line-through}

/* Meal card */
.meal-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);transition:.15s}
.meal-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--orange)}
.meal-cal{font-size:18px;font-weight:800;color:var(--gray-800)}

/* Fitness card */
.fit-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.fit-card.rest{background:var(--gray-50)}
.fit-emoji{font-size:28px}

/* Grocery */
.grocery-cat{font-size:14px;font-weight:700;color:var(--gray-800);padding:10px 0 6px;border-bottom:2px solid var(--gray-200);margin-top:12px}
.grocery-item{padding:6px 0;font-size:13px;color:var(--gray-600);border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px}
.grocery-item:last-child{border-bottom:none}
.grocery-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--gray-300);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s}
.grocery-check.checked{background:var(--emerald);border-color:var(--emerald);color:#fff}

/* Toggle tabs inside meals */
.toggle{display:flex;background:var(--gray-100);border-radius:8px;padding:3px}
.toggle-btn{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray-500);transition:.15s;font-family:inherit}
.toggle-btn.active{background:#fff;color:var(--gray-800);box-shadow:var(--shadow)}

/* Bottom tab bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;cursor:pointer;border:none;background:none;color:var(--gray-400);font-size:10px;font-weight:500;transition:.15s;touch-action:manipulation;font-family:inherit}
.tab.active{color:var(--emerald)}
.tab-icon{font-size:20px;margin-bottom:2px}
.tab-dot{width:4px;height:4px;border-radius:50%;background:var(--emerald);margin-top:2px;opacity:0;transition:.15s}
.tab.active .tab-dot{opacity:1}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--radius-lg);padding:24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}

/* Misc */
.emoji-icon{font-size:20px;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;flex-shrink:0}
.divider{height:1px;background:var(--gray-100);margin:8px 0}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.info-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.info-row:last-child{border-bottom:none}
.stat-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--gray-500);display:flex;align-items:center;gap:4px}
.stat-value{font-size:20px;font-weight:800;margin-top:2px}
.stat-sub{font-size:11px;color:var(--gray-400);margin-top:1px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeIn .25s ease}

/* Safe area */
@supports(padding: env(safe-area-inset-bottom)){
  .tab-bar{padding-bottom:env(safe-area-inset-bottom)}
  #app{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
}
</style>
</head>

let state = {
  tab: 'dashboard',
  mealDay: new Date().getDay() === 0 ? 6 : new Date().getDay() - 1,
  mealView: 'plan',
  fitWeek: 0,
  startDate: null,
  checkedGrocery: {}
};

function todayKey(){ return new Date().toISOString().split('T')[0]; }

function loadState(){
  try {
    state.startDate = localStorage.getItem('encore_start') || null;
    let t = localStorage.getItem('encore_track_'+todayKey());
    state.todayTracker = t ? JSON.parse(t) : {tasks:{},water:0};
    let g = localStorage.getItem('encore_grocery_checked');
    state.checkedGrocery = g ? JSON.parse(g) : {};
  } catch(e){
    state.todayTracker = {tasks:{},water:0};
    state.checkedGrocery = {};
  }
}

function saveTracker(){
  try{ localStorage.setItem('encore_track_'+todayKey(), JSON.stringify(state.todayTracker)); }catch(e){}
}

function saveStart(){
  try{ localStorage.setItem('encore_start', state.startDate); }catch(e){}
}

function saveGrocery(){
  try{ localStorage.setItem('encore_grocery_checked', JSON.stringify(state.checkedGrocery)); }catch(e){}
}

function getProgramWeek(){
  if(!state.startDate) return null;
  const s = new Date(state.startDate+'T00:00:00');
  const n = new Date(); n.setHours(0,0,0,0);
  const diff = Math.floor((n - s)/(1000*60*60*24));
  return Math.min(Math.max(Math.floor(diff/7)+1, 1), 12);
}

function getMealWeek(){
  const pw = getProgramWeek();
  if(!pw) return 0;
  return ((pw-1)%4);
}

function getProgramDay(){
  if(!state.startDate) return 0;
  const s = new Date(state.startDate+'T00:00:00');
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.max(0, Math.floor((n - s)/(1000*60*60*24)));
}

function render(){
  const app = document.getElementById('app');
  let html = '';
  if(!state.startDate){
    html = renderSetup();
  } else {
    html = '<div class="page-content" style="padding-top:16px">';
    if(state.tab==='dashboard') html += renderDashboard();
    else if(state.tab==='meals') html += renderMeals();
    else if(state.tab==='fitness') html += renderFitness();
    else if(state.tab==='tracker') html += renderTracker();
    else if(state.tab==='guide') html += renderGuide();
    html += '</div>';
    html += renderTabBar();
  }
  app.innerHTML = html;
  bindEvents();
}

          <div class="text-3xl fw-800" style="color:#2563eb">${tr.water}</div>
          <div class="text-xs text-gray">of 8 glasses</div>
        </div>
        <button class="btn-icon" onclick="changeWater(1)" style="background:#dbeafe;color:#2563eb">+</button>
      </div>
      <div class="water-bar" style="margin-top:12px">
        ${[...Array(8)].map((_,i)=>`<div class="water-glass ${i<tr.water?'filled':'empty'}"></div>`).join('')}
      </div>
    </div>
  `;
}

function renderTabBar(){
  const tabs = [
    {id:'dashboard',icon:'🏠',label:'Home'},
    {id:'meals',icon:'🍽️',label:'Meals'},
    {id:'fitness',icon:'💪',label:'Fitness'},
    {id:'tracker',icon:'✅',label:'Tracker'},
    {id:'guide',icon:'📖',label:'Guide'}
  ];
  return `<div class="tab-bar">${tabs.map(t=>`
    <button class="tab ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>
      <span>${t.label}</span>
      <div class="tab-dot"></div>
    </button>
  `).join('')}</div>`;
}

// === EVENT HANDLERS ===
function switchTab(t){
  state.tab = t;
  if(t==='fitness'){
    const pw = getProgramWeek();
    if(pw) state.fitWeek = pw - 1;
  }
  render();
  window.scrollTo(0,0);
}

function startProgram(){
  state.startDate = todayKey();
  state.todayTracker = {tasks:{},water:0};
  saveStart();
  state.fitWeek = 0;
  render();
}

function resetProgram(){
  if(confirm('Reset your program start date to today? Your tracking history will be kept.')){
    state.startDate = todayKey();
    saveStart();
    render();
  }
}

function setMealDay(d){ state.mealDay = d; render(); }
function setMealView(v){ state.mealView = v; render(); }

function jumpMealWeek(w){
  // Temporarily override meal week view - we store the original getMealWeek and let user browse
  // For simplicity, we just update selected day to 0 and render the requested week
  state._overrideMealWeek = w;
  render();
}

// Override getMealWeek to support browsing
const _origGetMealWeek = getMealWeek;
getMealWeek = function(){
  if(state._overrideMealWeek !== undefined) return state._overrideMealWeek;
  return _origGetMealWeek();
};

function setFitWeek(w){ state.fitWeek = w; render(); }

function toggleTask(id){
  if(state.todayTracker.tasks[id]) delete state.todayTracker.tasks[id];
  else state.todayTracker.tasks[id] = true;
  saveTracker();
  render();
}

function changeWater(delta){
  state.todayTracker.water = Math.min(12, Math.max(0, state.todayTracker.water + delta));
  saveTracker();
  render();
}

function toggleGrocery(key){
  if(state.checkedGrocery[key]) delete state.checkedGrocery[key];
  else state.checkedGrocery[key] = true;
  saveGrocery();
  render();
}

function bindEvents(){}

// === INIT ===
loadState();
render();
</script>
